<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Received — Sugar & Shai Cookies</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: #FDF6EE;
      color: #3D2B27;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(74,94,42,0.1);
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      color: #4A5E2A;
      margin-bottom: 0.75rem;
    }
    p { color: #7A5C56; line-height: 1.7; margin-bottom: 2rem; }
    a {
      display: inline-block;
      background: #4A5E2A;
      color: #fff;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }
    a:hover { background: #3A4A20; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🍪</div>
    <h1>Order Received!</h1>
    <p id="thankMsg">Your Wednesday order is locked in! 🎉<br /><br />Shai will reach out <strong>on pickup day</strong> to coordinate a time. Follow along on Instagram for updates!</p>
    <a href="index.html">Back to Home</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const date = params.get('date');
    if (date) {
      document.getElementById('thankMsg').innerHTML =
        'Your order is locked in for <strong>' + date + '</strong>! 🎉<br /><br />Shai will reach out <strong>on pickup day</strong> to coordinate a time. Follow along on Instagram for updates!';
    }
  </script>
</body>
</html>
