<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Received — Sugar & Shai Cookies</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: linear-gradient(160deg, #f9f5fd 0%, #ede5f7 100%);
      color: #3D2B27;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(107,63,160,0.12);
      border: 1.5px solid rgba(155,114,207,0.4);
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      color: #6b3fa0;
      margin-bottom: 0.75rem;
    }
    p { color: #7A5C56; line-height: 1.7; margin-bottom: 2rem; }
    .tag {
      display: inline-block;
      background: #f0e8f8;
      color: #6b3fa0;
      border: 1.5px solid #9b72cf;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      margin-bottom: 1.25rem;
    }
    a {
      display: inline-block;
      background: #7952b3;
      color: #fff;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }
    a:hover { background: #6b3fa0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🍠</div>
    <div class="tag">Flavour of the Month</div>
    <h1>Order Received!</h1>
    <p>You grabbed the Ube Bliss — great choice! 💜<br /><br />Shai will get back to you within 24–48 hours to confirm your spot. Keep an eye on your email and follow along on Instagram for updates!</p>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
